id: discovery
inputs: [snapshot.indicators, artifact.strategy_scan]
optional_inputs: []
outputs: [artifact.discovery_report]
policies: [DATA.QUALITY, RESEARCH.EVIDENCE]
skills: [discovery, screener, sector-scan]
steps:
  - scan the market and sectors using current registered indicator data
  - score candidates through snapshot, scoring, and strategy-validation stages
  - persist candidates, evidence, risks, and falsification conditions
preflight: [snapshot.indicators]
completion: [DATA.REGISTERED_CURRENT, RESEARCH.SOURCES_BOUND]
on_failure: [retry transient scan failures, fallback by excluding unverifiable candidates, stop when current indicator evidence is unavailable]
