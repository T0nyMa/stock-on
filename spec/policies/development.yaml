id: DEV.CHANGE
description: Development changes require risk-proportionate tests, full verification, explicit database migration compatibility, and `.venv/bin/python scripts/check_project_spec.py` before every commit.
gates:
  - id: DEV.TESTS_VERIFIED
    severity: block
    check: test_verification
    message: Development changes require fresh test evidence.
    remediation: Run focused tests, the full relevant verification suite, and `.venv/bin/python scripts/check_project_spec.py` before committing.
